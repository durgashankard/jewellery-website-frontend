<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>jewellery-website</title>
    <!-- <link rel="stylesheet" href="../node_modules/bootstrap-icons/font/bootstrap-icons.css"> -->

    <!-- Bootstrap CSS
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet"> -->

    <!-- Bootstrap Icons -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet">

    <style>
        /* ========== Base (mobile-first) styles ========== */

        body {
            background-color: rgba(240, 233, 233, 0.881);
            margin: 0;
            padding: 0;
            font-family: Arial, sans-serif;
        }

        /* Header */

        header {
            display: flex;
            flex-direction: column;
            align-items: center;
            position: sticky;
            top: 0;
            padding: 10px;
            background-color: black;
            color: whitesmoke;
            z-index: 10;
        }

        .logo {
            font-size: 20px;
            font-weight: bold;
            margin-bottom: 10px;
        }

        .bi-infinity {
            color: yellow;
            font-size: 26px;
        }

        /* Navigation – mobile */

        .nav ol,
        .nav-link ol {
            list-style: none;
            display: flex;
            flex-wrap: wrap;
            justify-content: center;
            padding: 0;
            margin: 5px 0;
        }

        .nav ol li,
        .nav-link ol li {
            margin: 5px 10px;
        }

        /* Banner image */

        .j-banner {
            width: 100%;
            height: auto;
            display: block;
        }

        /* Main layout */

        .main-content {
            display: flex;
            flex-direction: column;
            padding: 10px;
        }

        .col-1,
        .col-2 {
            width: 100%;
            box-sizing: border-box;
        }

        /* Main image */

        .jewellery-image {
            width: 100%;
            max-width: 100%;
            height: auto;
        }

        /* Right column */

        .col-2 {
            background-image: linear-gradient(purple, pink, green, whitesmoke);
            padding: 20px;
        }

        /* Title and text */

        .title h1 {
            margin: 0 0 10px 0;
        }

        .sub-title {
            margin-bottom: 10px;
            line-height: 1.4;
        }

        /* Button */

        button {
            margin-top: 10px;
            padding: 7px 12px;
            background-color: black;
            color: aliceblue;
            border: none;
            cursor: pointer;
        }

        /* Cards container */

        .cart {
            display: flex;
            flex-wrap: wrap;
            margin-top: 15px;
        }

        /* Card common styles */

        .cart-1,
        .cart-2,
        .cart-3 {
            width: 100%;
            max-width: 220px;
            margin: 10px auto;
            padding: 10px;
            text-align: center;
            border: 1px solid gray;
            box-sizing: border-box;
        }

        /* Card backgrounds */

        .cart-1,
        .cart-2 {
            background-image: linear-gradient(gray, blue, pink);
        }

        .cart-3 {
            background-image: linear-gradient(rgb(90, 32, 32),
                    yellow,
                    green,
                    rgb(140, 140, 209),
                    rgb(93, 40, 49));
        }

        /* Card images */

        .cart-1 img,
        .cart-2 img,
        .cart-3 img {
            width: 100%;
            height: auto;
        }

        /* Card text */

        .cart-body,
        .cart-footer {
            font-size: 16px;
            font-weight: bold;
        }

        .cart-footer {
            color: tomato;
        }

        /* ========== Tablet and up (>= 768px) ========== */

        @media screen and (min-width: 768px) {
            header {
                flex-direction: row;
                justify-content: space-between;
                align-items: center;
            }

            .logo {
                margin-bottom: 0;
            }

            .nav ol,
            .nav-link ol {
                flex-wrap: nowrap;
            }

            .nav ol li {
                margin-right: 30px;
                margin-left: 0;
            }

            .nav-link ol li {
                margin-right: 20px;
                margin-left: 0;
            }

            .main-content {
                flex-direction: row;
                gap: 20px;
                padding: 20px;
            }

            .col-1,
            .col-2 {
                flex: 1;
            }

            .col-2 {
                padding: 40px;
            }

            .cart {
                justify-content: flex-start;
            }

            .cart-1,
            .cart-2,
            .cart-3 {
                margin: 10px 10px 0 0;
            }
        }

        /* ========== Desktop and large screens (>= 1024px) ========== */

        @media screen and (min-width: 1024px) {
            .jewellery-image {
                max-width: 650px;
            }

            .cart-1,
            .cart-2,
            .cart-3 {
                width: 200px;
            }
        }
    </style>
</head>

<body>
    <header>
        <div class="logo">
            <span>&nbsp;</span>
            <span class="bi bi-infinity">&nbsp;</span>
            <span>JEWELLERY</span>
        </div>


        <div class="nav">
            <ol>
                <li>HOME</li>
                <li>SHOP</li>
                <li>MATERIALS</li>
                <li>ABOUT US</li>
                <li>BLOG'S</li>
                <li>CONTACTS</li>
            </ol>
        </div>

        <div class="nav-link">
            <ol>
                <li><span class="bi bi-facebook"></span></li>
                <li><span class="bi bi-instagram"></span></li>
                <li><span class="bi bi-twitter-x"></span></li>
                <li><span class="bi bi-cart3"></span></li>
                <li><span class="bi bi-person-fill"></span></li>
            </ol>
        </div>
    </header>
    <main>
        <div>
            <img src="./public/images/jewellery/jewellery-banner.jpg" class="j-banner" alt="jewellery-banner">
        </div>
        <div class="main-content">
            <div class="col-1">
                <img src="./public/images/jewellery/jewellery-image.jpg" class="jewellery-image" alt="">
            </div>
            <div class="col-2">
                <div class="container">
                    <div class="title">
                        <h1>NEW HANDMADE <br> &nbsp; JEWELLERY'S</h1>
                    </div>
                    <div class="sub-title">
                        Lorem ipsum dolor, sit amet consectetur adipisicing elit. Amet dolore <br> quaerat quae et
                        magnam
                        tempora
                        cupiditate tempore, minus repellat quo.
                    </div>
                    <button>EXPLORE MORE</button>
                    <div class="cart">
                        <div class="cart-1">
                            <div class="cart-header">
                                <img src="./public/images/jewellery/golden-ring-jewelry.jpg" alt="">
                            </div>
                            <div class="cart-body">
                                <span>Golden Ring</span>
                            </div>
                            <div class="cart-footer">
                                <span> $ 825 </span>
                            </div>
                        </div>
                        <div class="cart-2">
                            <div class="cart-header">
                                <img src="./public/images/jewellery/queen-crown-still-life.jpg" alt="">
                            </div>
                            <div class="cart-body">
                                <span>Rose Gold Tiara</span>
                            </div>
                            <div class="cart-footer">
                                <span> $ 1805 </span>
                            </div>
                        </div>

                        <div class="cart-3">
                            <div class="cart-header">
                                <img src="./public/images/jewellery/queen-style-jw.jpg" alt="">
                            </div>

                        </div>
                    </div>

                </div>
            </div>
        </div>
    </main>
</body>

</html>
